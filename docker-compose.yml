version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      - SECRET_KEY=your-secret-key-change-in-production
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_AUTH_BASE_URL=http://localhost:3001
    restart: unless-stopped
